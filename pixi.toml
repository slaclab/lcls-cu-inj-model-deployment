[workspace]
name = "online-model"
channels = ["https://prefix.dev/conda-forge"] # TODO: can we change to not use conda-forge?
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.12,<3.13"

[pypi-dependencies]
pyepics = "*"
k2eg = "*"
# mlflow on conda is at 3.2.0 but we probably need 3.4.x so can't install lume and mlflow from conda
mlflow = "==3.4.*"
lume-model = ">=2.0.0"
sympy = "*"
online_model = { path = ".", editable = true }

#[feature.gpu]
#system-requirements = { cuda = "12.0" }
#[feature.gpu.pypi-dependencies]
#torch = { version = ">=2.6.0", index = "https://download.pytorch.org/whl/cu124" }

[feature.cpu.pypi-dependencies]
torch = { version = ">=2.7.1", index = "https://download.pytorch.org/whl/cpu" }

[environments]
#gpu = ["gpu"]
# Make CPU the default environment
default = ["cpu"]