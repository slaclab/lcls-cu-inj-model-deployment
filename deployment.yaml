apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcls-cu-inj-model-deployment
  namespace: lume-online-ml
  annotations:
        k8s.v1.cni.cncf.io/networks: '[
          {
            "name": "sdf-ad-ingest",
            "namespace": "multus-system",
            "ips": [ "172.24.8.120/24" ],
            "gateway": [ "172.24.8.1" ]
          }
        ]'
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: lcls-cu-inj-model
  template:
    metadata:
      labels:
        app: lcls-cu-inj-model
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoreDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: edu.stanford.slac.sdf.k8s.networking.multus
                operator: In  
                values:
                - enable
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/ext-load-balancer
      imagePullSecrets:
      - name: gh-regcred
      containers:
      - name: lcls-cu-inj-model
        image: ghcr.io/slaclab/lcls-cu-inj-model:72b6c3d
        imagePullPolicy: Always
        restartPolicy: Always
        resources:
          limits:
            memory: "2Gi"
            cpu: "500m"
        env:
          - name: EPICS_CA_ADDR_LIST
            valueFrom:
              secretKeyRef:
                name: epics-secrets
                key: ca_addr_list
          - name: K2EG_PYTHON_CONFIGURATION_PATH_FOLDER
            value: /app/src/config
          - name: MODEL_VERSION
            value: "1"
          - name: INFERENCE_SERVICE_URL
            value: "http://inference-service-cu-inj:8000"
        volumeMounts:
          - name: s3cmd-config-volume
            mountPath: /app/src/config/lcls.ini
            subPath: lcls.ini
      volumes:
        - name: s3cmd-config-volume
          configMap:
            name: k2eg-config-map
